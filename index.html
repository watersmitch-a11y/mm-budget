<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M&M Budget 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c-bg:#f7f6f2;--c-card:#fff;--c-border:#e8e6e0;
  --c-text:#1a1a18;--c-muted:#6b6a64;--c-accent:#2563eb;
  --c-green:#16a34a;--c-red:#dc2626;--c-amber:#d97706;
  --c-mitch:#2563eb;--c-molly:#a855f7;
}
@media(prefers-color-scheme:dark){:root{
  --c-bg:#121210;--c-card:#1e1e1a;--c-border:#2e2e28;
  --c-text:#e8e6de;--c-muted:#7a7870;--c-accent:#60a5fa;
  --c-green:#4ade80;--c-red:#f87171;--c-amber:#fbbf24;
  --c-mitch:#60a5fa;--c-molly:#c084fc;
}}
body{font-family:'DM Sans',sans-serif;background:var(--c-bg);color:var(--c-text);font-size:14px;line-height:1.5;min-height:100vh}
#lock-screen{position:fixed;inset:0;background:var(--c-bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.lock-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:14px;padding:32px;width:320px;text-align:center}
.lock-logo{font-family:'DM Mono',monospace;font-size:14px;color:var(--c-muted);margin-bottom:6px}
.lock-logo span{color:var(--c-text)}
.lock-title{font-size:18px;font-weight:500;margin-bottom:6px}
.lock-sub{font-size:12px;color:var(--c-muted);margin-bottom:24px}
.lock-input{width:100%;padding:10px;border:1px solid var(--c-border);border-radius:8px;background:var(--c-bg);color:var(--c-text);font-size:14px;font-family:inherit;text-align:center;letter-spacing:.1em;margin-bottom:12px}
.lock-input:focus{outline:none;border-color:var(--c-accent)}
.lock-btn{width:100%;padding:10px;border:none;border-radius:8px;background:var(--c-accent);color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.lock-btn:hover{opacity:.9}
.lock-error{font-size:12px;color:var(--c-red);margin-top:8px;min-height:18px}
.lock-hint{font-size:11px;color:var(--c-muted);margin-top:16px}
.app{display:grid;grid-template-rows:auto 1fr;height:100vh;overflow:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--c-border);background:var(--c-card);gap:10px;flex-wrap:wrap}
.logo{font-family:monospace;font-size:13px;font-weight:500;letter-spacing:.05em;color:var(--c-muted)}
.logo span{color:var(--c-text)}
.nav{display:flex;gap:4px}
.nav-btn{padding:6px 14px;border-radius:20px;border:1px solid transparent;background:none;color:var(--c-muted);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.nav-btn.active{background:var(--c-text);color:var(--c-bg)}
.nav-btn:not(.active):hover{border-color:var(--c-border);color:var(--c-text)}

.current-bal{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:8px;border:1px solid var(--c-border);background:var(--c-bg);cursor:pointer;transition:border-color .15s}
.current-bal:hover{border-color:var(--c-accent)}
.current-bal-label{font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--c-muted)}
.current-bal-value{font-family:monospace;font-size:14px;font-weight:500}
.current-bal-value.pos{color:var(--c-green)}.current-bal-value.neg{color:var(--c-red)}
.bal-edit-wrap{display:flex;align-items:center;gap:6px}
.bal-input{font-family:monospace;font-size:14px;width:110px;padding:2px 6px;border:1px solid var(--c-accent);border-radius:6px;background:var(--c-bg);color:var(--c-text);outline:none}
.bal-save-btn{padding:3px 8px;border-radius:6px;border:none;background:var(--c-accent);color:#fff;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.main{display:grid;grid-template-columns:1fr;overflow:hidden}
/* sidebar removed */
.content{overflow-y:auto;padding:18px 20px}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:10px;padding:12px 14px}
.stat-label{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--c-muted);margin-bottom:5px}
.stat-value{font-family:monospace;font-size:18px;font-weight:500;color:var(--c-text)}
.stat-value.pos{color:var(--c-green)}.stat-value.neg{color:var(--c-red)}
.stat-value.mitch{color:var(--c-mitch)}.stat-value.molly{color:var(--c-molly)}
.stat-sub{font-size:10px;color:var(--c-muted);margin-top:2px}
/* Income breakdown strip */
.income-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.alert-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.alert-card.danger{border-color:#dc262660;background:#dc262608}
.alert-card.warning{border-color:#d9770660;background:#d9770608}
.alert-card.safe{border-color:#16a34a60;background:#16a34a08}
.alert-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.alert-icon.danger{background:#dc262618}
.alert-icon.warning{background:#d9770618}
.alert-icon.safe{background:#16a34a18}
.alert-detail{flex:1;min-width:0}
.alert-name{font-size:11px;font-weight:500;color:var(--c-muted);text-transform:uppercase;letter-spacing:.05em}
.alert-date{font-family:monospace;font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alert-date.danger{color:var(--c-red)}
.alert-date.warning{color:var(--c-amber)}
.alert-date.safe{color:var(--c-green)}
.alert-sub{font-size:11px;color:var(--c-muted);margin-top:1px}
.income-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.income-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.income-avatar.mitch{background:#2563eb18;color:var(--c-mitch)}
.income-avatar.molly{background:#a855f718;color:var(--c-molly)}
.income-detail{flex:1}
.income-name{font-size:11px;font-weight:500;color:var(--c-muted);text-transform:uppercase;letter-spacing:.05em}
.income-amount{font-family:monospace;font-size:16px;font-weight:500}
.income-amount.mitch{color:var(--c-mitch)}.income-amount.molly{color:var(--c-molly)}
.income-pays{font-size:11px;color:var(--c-muted);margin-top:1px}
/* Charts */
.chart-row{display:grid;grid-template-columns:1fr 220px;gap:14px;margin-bottom:16px}
.chart-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:10px;padding:14px}
.chart-title{font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--c-muted);margin-bottom:10px}
.chart-wrap{position:relative;width:100%;height:150px}
.cat-list{display:flex;flex-direction:column;gap:7px}
.cat-row{display:flex;align-items:center;gap:7px}
.cat-name{font-size:11px;color:var(--c-text);min-width:88px;text-align:right}
.cat-track{flex:1;height:5px;border-radius:3px;background:var(--c-border);overflow:hidden}
.cat-fill{height:100%;border-radius:3px}
.cat-val{font-family:monospace;font-size:11px;color:var(--c-muted);min-width:48px;text-align:right}
/* Transaction list */
.section-title{font-size:13px;font-weight:500;color:var(--c-text);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.add-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;border:1px solid var(--c-accent);background:none;color:var(--c-accent);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.add-btn:hover{background:var(--c-accent);color:#fff}
.txn-list{background:var(--c-card);border:1px solid var(--c-border);border-radius:10px;overflow:hidden}
.txn-header{display:grid;grid-template-columns:75px 1fr 80px 80px 90px 28px;gap:8px;padding:8px 14px;border-bottom:1px solid var(--c-border);font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--c-muted)}
.txn-row{display:grid;grid-template-columns:75px 1fr 80px 80px 90px 28px;gap:8px;padding:8px 14px;border-bottom:1px solid var(--c-border);align-items:center;transition:background .1s}
.txn-row:last-child{border-bottom:none}
.txn-row:hover{background:var(--c-border)30}
.txn-row.income-row{background:#16a34a06}
.txn-row.is-custom{background:#2563eb06}
.txn-date{font-family:monospace;font-size:11px;color:var(--c-muted)}
.txn-label{font-size:12px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.txn-tag{font-size:10px;padding:1px 6px;border-radius:8px;background:var(--c-border);color:var(--c-text);white-space:nowrap}
.txn-tag.income-tag.mitch{background:#2563eb15;color:var(--c-mitch)}
.txn-tag.income-tag.molly{background:#a855f715;color:var(--c-molly)}
.txn-tag.custom-tag{background:#2563eb15;color:var(--c-accent)}
.txn-in{font-family:monospace;font-size:12px;font-weight:500;text-align:right;white-space:nowrap}
.txn-in.mitch{color:var(--c-mitch)}.txn-in.molly{color:var(--c-molly)}.txn-in.other{color:var(--c-green)}
.txn-out{font-family:monospace;font-size:12px;color:var(--c-red);text-align:right;white-space:nowrap}
.txn-out.zero{color:var(--c-muted)}
.edit-btn{width:22px;height:22px;border-radius:5px;border:1px solid var(--c-border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--c-muted);font-size:12px;transition:all .15s;flex-shrink:0}
.edit-btn:hover{border-color:var(--c-accent);color:var(--c-accent)}
.txn-bal{font-family:monospace;font-size:12px;text-align:right;white-space:nowrap}
.txn-bal.pos{color:var(--c-green)}.txn-bal.neg{color:var(--c-red)}
.txn-row.is-past{opacity:0.55}
.txn-row.is-today{background:var(--c-accent)08;border-left:2px solid var(--c-accent)}
.txn-row.is-future{}
.txn-divider{padding:6px 14px;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--c-accent);background:var(--c-accent)06;border-bottom:1px solid var(--c-border)}
/* Overview */
.ov-income-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100}
.modal{background:var(--c-card);border:1px solid var(--c-border);border-radius:14px;padding:22px;width:350px;max-width:90vw;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:101}
.modal-title{font-size:14px;font-weight:500;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--c-muted);cursor:pointer;font-size:17px;line-height:1;padding:2px 6px}
.form-row{margin-bottom:12px}
.form-label{font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--c-muted);margin-bottom:4px;display:block}
.form-input{width:100%;padding:7px 9px;border:1px solid var(--c-border);border-radius:7px;background:var(--c-bg);color:var(--c-text);font-family:'DM Sans',sans-serif;font-size:13px}
.form-input:focus{outline:none;border-color:var(--c-accent)}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.btn-cancel{padding:7px 14px;border-radius:7px;border:1px solid var(--c-border);background:none;color:var(--c-muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px}
.btn-save{padding:7px 14px;border-radius:7px;border:none;background:var(--c-accent);color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500}
.btn-delete{padding:7px 12px;border-radius:7px;border:1px solid var(--c-red);background:none;color:var(--c-red);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px}
.btn-delete:hover{background:var(--c-red);color:#fff}
.toast{position:fixed;bottom:18px;right:18px;background:var(--c-text);color:var(--c-bg);padding:9px 14px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;display:flex;align-items:center;gap:4px}
.toast.show{opacity:1;pointer-events:auto}
</style>
</head>

  <div class="header">
    <div class="logo">M&amp;M <span>Budget 2026</span></div>
    <div id="sync-status" style="font-size:11px;color:var(--c-green);font-family:'DM Mono',monospace;min-width:60px"></div>
    <div class="nav">
      <button class="nav-btn active" onclick="setView('month')">Monthly</button>

      <button class="nav-btn" onclick="setView('recurring')">Recurring</button>

    <div id="month-picker" style="display:none;align-items:center;gap:6px">
      <button onclick="stepMonth(-1)" style="width:26px;height:26px;border-radius:50%;border:1px solid var(--c-border);background:none;color:var(--c-muted);cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center">‹</button>
      <span id="month-picker-label" style="font-family:'DM Mono',monospace;font-size:13px;color:var(--c-text);min-width:90px;text-align:center"></span>
      <button onclick="stepMonth(1)" style="width:26px;height:26px;border-radius:50%;border:1px solid var(--c-border);background:none;color:var(--c-muted);cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center">›</button>
    </div>
    <div id="current-bal-widget" class="current-bal" onclick="editBalance()" title="Click to set current balance">
      <span class="current-bal-label">Balance</span>
      <span class="current-bal-value" id="cur-bal-display">Set</span>
    </div>

  </div>
  <div class="main">
    <div class="sidebar" id="sidebar" style="display:none"></div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()"></div>
<div class="modal" id="modal" style="display:none"></div>
<div class="toast" id="toast"></div>

let CUSTOM={};

// ── LOCAL CACHE (instant reads) ───────────────────────────────────────────────
function loadCustom(){
  try{const s=localStorage.getItem('mm_budget_custom');if(s)CUSTOM=JSON.parse(s);}catch(e){}
}
function saveCustomLocal(){
  try{localStorage.setItem('mm_budget_custom',JSON.stringify(CUSTOM));}catch(e){}
}
function cleanCustom(){
  // Remove empty month arrays to keep Firebase data clean
  Object.keys(CUSTOM).forEach(k=>{
    if(CUSTOM[k]&&CUSTOM[k].length===0) delete CUSTOM[k];
  });
}
function saveCustom(){
  cleanCustom();
  saveCustomLocal();
  // Only save to Firebase after unlock — FB_DATA_PATH is set by unlockApp()
  if(!window.FB_DATA_PATH){return;}
  fetch(FB_URL+window.FB_DATA_PATH,{
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(CUSTOM)
  }).catch(()=>{});
}

// ── FIREBASE SYNC ON LOAD ─────────────────────────────────────────────────────
function syncFromFirebase(){
  const customPath=window.FB_DATA_PATH;
  const balPath=window.FB_BAL_DATA_PATH;
  // Only sync if unlocked (paths set by unlockApp)
  if(!customPath){return;}
  // Fetch custom entries
  fetch(FB_URL+customPath)
    .then(r=>r.json())
    .then(data=>{
      if(data&&typeof data==='object'&&Object.keys(data).length>0){
        // Firebase has data — merge: Firebase wins for keys it has,
        // but keep any local keys that Firebase doesn't have
        const merged={...CUSTOM};
        Object.keys(data).forEach(k=>{merged[k]=data[k];});
        CUSTOM=merged;
        saveCustomLocal();
        applyBuiltinEntries();
        renderSidebar();
        renderContent();
        renderBal();
        showSyncStatus('Synced ✓');
      } else {
        // Firebase is empty (new device or first use) — push local data up
        applyBuiltinEntries();
        if(Object.keys(CUSTOM).length>0){
          fetch(FB_URL+customPath,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(CUSTOM)}).catch(()=>{});
        }
        renderSidebar();
        renderContent();
        renderBal();
        showSyncStatus('Synced ✓');
      }
    })
    .catch(()=>showSyncStatus('Offline'));
  // Fetch balance — only if the hashed path is available
  if(!balPath){return;}
  fetch(FB_URL+balPath)
    .then(r=>r.json())
    .then(data=>{
      if(data!==null&&data!==undefined&&!isNaN(parseFloat(data))){
        // Firebase has a balance — use it as source of truth
        try{localStorage.setItem('mm_current_balance',String(data));}catch(e){}
        renderBal();
        renderContent();
      } else {
        // Firebase has no balance — push local value up so other devices get it
        const localBal=loadBal();
        if(localBal!==null){
          fetch(FB_URL+balPath,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(localBal)}).catch(()=>{});
        }
      }
    })
    .catch(()=>{});
}

function showSyncStatus(msg){
  const el=document.getElementById('sync-status');
  if(el){el.textContent=msg;setTimeout(()=>{el.textContent='';},3000);}
}

loadCustom();

const undoStack = [];
function pushUndo(){
  undoStack.push(JSON.stringify(CUSTOM));
  if(undoStack.length > 20) undoStack.shift();
}
function undo(){
  if(!undoStack.length) return;
  CUSTOM = JSON.parse(undoStack.pop());
  saveCustom();
  hideUndoToast();
  renderSidebar();
  renderContent();
  toast('Undone');
}

let undoToastTimer = null;
function toastUndo(msg){
  const t = document.getElementById('toast');
  t.innerHTML = msg + ' <button onclick="undo()" style="margin-left:10px;padding:2px 10px;border-radius:5px;border:1px solid rgba(255,255,255,0.4);background:none;color:inherit;font-size:12px;cursor:pointer;font-family:inherit">Undo</button>';
  t.classList.add('show');
  clearTimeout(undoToastTimer);
  undoToastTimer = setTimeout(() => hideUndoToast(), 5000);
}
function hideUndoToast(){
  const t = document.getElementById('toast');
  t.classList.remove('show');
}

  }
}

function fmt(n){return'$'+Math.abs(Math.round(n)).toLocaleString();}
function fmtS(n){return(n>=0?'+':'-')+'$'+Math.abs(Math.round(n)).toLocaleString();}
function parseD(s){const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function dayLbl(s){return parseD(s).toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});}

function getMonthData(k){
  const base=BASE[k]||{income:0,mitch:0,molly:0,out:0,net:0,categories:{},transactions:[]};
  const customs=CUSTOM[k]||[];
  // Build set of suppressed base transactions {date|item}
  const suppressed=new Set(customs.filter(c=>c._suppress).map(c=>c.date+'|'+c.item));
  // Filter base transactions removing suppressed ones
  const baseTxns=(base.transactions||[]).filter(t=>!suppressed.has(t.date+'|'+t.item));
  // Calculate adjustment for suppressed items
  const suppressedTxns=(base.transactions||[]).filter(t=>suppressed.has(t.date+'|'+t.item));
  const suppressedOut=suppressedTxns.reduce((s,t)=>t.type==='debit'?s+t.amount:s,0);
  const suppressedIn=suppressedTxns.reduce((s,t)=>t.type==='income'?s+t.amount:s,0);
  // Non-suppress custom entries
  const activeCust=customs.filter(c=>!c._suppress);
  if(!activeCust.length&&!suppressed.size)return base;
  const extraOut=activeCust.reduce((s,c)=>s+(c.type==='debit'?c.amount:0),0);
  const extraIn=activeCust.reduce((s,c)=>s+(c.type==='income'?c.amount:0),0);
  // Build rename map {date|item -> newName}
  const renameMap={};
  customs.filter(c=>c._rename).forEach(c=>{renameMap[c.date+'|'+c.item]=c._rename;});
  // Apply renames to base transactions
  const renamedBase=baseTxns.map(t=>{
    const key=t.date+'|'+t.item;
    return renameMap[key]?{...t,item:renameMap[key],_originalItem:t.item}:t;
  });
  const txns=[...renamedBase,...activeCust.filter(c=>c.type!=='rename')].sort((a,b)=>a.date<b.date?-1:1);
  return{...base,
    income:base.income+extraIn-suppressedIn,
    out:base.out+extraOut-suppressedOut,
    net:base.net+extraIn-extraOut-suppressedIn+suppressedOut,
    transactions:txns};
}

function findNextZeroBalance(){
  // Walk through all months from today forward, simulate running balance
  // Start from the current set balance if available, otherwise use latest known end_balance
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = localDateStr(today).slice(0,7);

  // Find all months >= this month, sorted
  const allKeys = Object.keys(BASE).sort();
  const futureKeys = allKeys.filter(k => k >= todayStr);
  if(!futureKeys.length) return null;

  // Use the set current balance as starting point if available, else use end of last past month
  let runBal = loadBal();
  if(runBal === null){
    // fall back to end_balance of the month before today
    const pastKeys = allKeys.filter(k => k < todayStr);
    if(pastKeys.length) runBal = getMonthData(pastKeys[pastKeys.length-1]).end_balance || 0;
    else runBal = 0;
  }

  // Walk each future month's transactions day by day
  for(const k of futureKeys){
    const m = getMonthData(k);
    const txns = (m.transactions||[]).sort((a,b)=>a.date<b.date?-1:1);
    for(const t of txns){
      if(t.date <= localDateStr(today)) continue; // skip today & past (cur balance already reflects today)
      if(t.type==='income') runBal += t.amount;
      else if(t.type==='debit' && t.amount > 0) runBal -= t.amount;
      if(runBal < 0){
        return {date: t.date, balance: Math.round(runBal), item: t.item};
      }
    }
  }
  return null; // never goes negative in dataset
}


function renderNegBalWidget(){

  const end30 = new Date(today); end30.setDate(end30.getDate()+30);
  const todayStr = localDateStr(today);
  const end30Str = localDateStr(end30);

  // Gather all forward transactions
  const fwdTxns = [];
  Object.keys(BASE).sort().forEach(mk => {
    if(mk < todayStr.slice(0,7) || mk > end30Str.slice(0,7)) return;
    const md = getMonthData(mk);
    (md.transactions||[]).forEach(t => {
      if(t.amount !== 0 && t.date > todayStr && t.date <= end30Str) fwdTxns.push(t);
    });
  });
  fwdTxns.sort((a,b) => a.date < b.date ? -1 : 1);

  // Compute per-date end balance
  const setCurBal = loadBal();
  let rb = setCurBal !== null ? setCurBal : 0;
  const dateBalMap = {};
  fwdTxns.forEach(t => {
    if(t.type === 'income') rb += t.amount;
    else if(t.amount > 0) rb -= t.amount;
    dateBalMap[t.date] = Math.round(rb);
  });

  const negDates = Object.entries(dateBalMap).filter(([d,b]) => b < 0).sort((a,b) => a[0] < b[0] ? -1 : 1);

  if(negDates.length === 0){
    el.innerHTML = '<div style="display:flex;align-items:center;gap:12px;border:1px solid #16a34a40;border-radius:10px;padding:14px 16px;background:var(--c-card)">'

      + '<div><div style="font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--c-muted);margin-bottom:2px">Next 30 days</div>'

  let rows = negDates.map(([d, b]) => {

    const dStr = dObj.toLocaleDateString('en-AU', {weekday:'short', day:'numeric', month:'short'});
    const daysAway = Math.round((dObj - today) / 86400000);
    return '<div style="display:grid;grid-template-columns:1fr auto;align-items:center;padding:7px 0;border-bottom:1px solid var(--c-border)">'
      + '<div><span style="font-size:13px;color:var(--c-text)">' + dStr + '</span>'
      + '<span style="font-size:11px;color:var(--c-muted);margin-left:6px">in ' + daysAway + 'd</span></div>'
      + '<span style="font-family:monospace;font-size:13px;font-weight:500;color:var(--c-red)">-$' + Math.abs(b).toLocaleString() + '</span>'
      + '</div>';
  }).join('');

  el.innerHTML = '<div style="background:var(--c-card);border:1px solid #dc262640;border-radius:10px;padding:14px 16px">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
    + '<div style="font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--c-muted)">Negative balance days — next 30</div>'
    + '<div style="font-size:11px;font-family:monospace;color:var(--c-red);font-weight:500">' + negDates.length + ' day' + (negDates.length !== 1 ? 's' : '') + '</div>'
    + '</div>' + rows + '</div>';
}

    if(mk<winStartStr.slice(0,7)||mk>winEndStr.slice(0,7)) return;
    const md=getMonthData(mk);
    (md.transactions||[]).forEach(t=>{
      if(t.amount!==0&&t.date>=winStartStr&&t.date<=winEndStr) allWindowTxns.push(t);
    });
  });
  allWindowTxns.sort((a,b)=>a.date<b.date?-1:1);

  const txns=showAllTxns ? allTxns : allWindowTxns;

  const mitchPays=(m.transactions||[]).filter(t=>t.type==='income'&&t.source==='Mitch');

    </div>

        <button class="add-btn" onclick="openAddModal('${k}')">+ Add</button>
      </div>
    </div>

      <div class="txn-header"><span>Date</span><span>Item</span><span style="text-align:right">In</span><span style="text-align:right">Out</span><span style="text-align:right">Balance</span><span></span></div>
      <div id="txn-rows"></div>
    </div>`;

  // Category bars moved to Overview tab

  // Transaction rows
  // Set window label
  const wlEl=document.getElementById('txn-window-label');
  if(wlEl){
    if(showAllTxns){wlEl.textContent='(showing '+curMonth+' · '+allTxns.length+' entries)';}
    else{
      const d1=new Date(winStartStr+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short'});
      const d2=new Date(winEndStr+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short'});
      wlEl.textContent='('+d1+' – '+d2+' · '+allWindowTxns.length+' entries)';
    }
  }

  // Build customIds across all months for the window
  const customIds=new Set(Object.values(CUSTOM).flat().map(c=>c.id));

  // Compute running balance for each transaction in the window
  // Start from user-set current balance (today), walk backwards to find window start balance
  const setCurBal = loadBal();
  const todayBalStr = localDateStr(todayD);
  // Gather ALL transactions from window start back to start of data to compute opening balance
  let openingBal = setCurBal !== null ? setCurBal : 0;
  if(setCurBal !== null){
    // Walk backwards: subtract income, add debits to get back to window start
    const preTxns = [];
    Object.keys(BASE).sort().forEach(mk => {
      const md = getMonthData(mk);
      (md.transactions||[]).forEach(t => {
        if(t.amount !== 0 && t.date >= winStartStr && t.date <= todayBalStr) preTxns.push(t);
      });
    });
    preTxns.sort((a,b)=>a.date<b.date?-1:1);
    // openingBal is balance at TODAY — subtract forward txns (today back to winStart)
    // i.e. undo txns from winStart..today to get winStart balance
    // Actually: openingBal = today's balance - net of txns from winStart to today
    const netSinceWinStart = preTxns.reduce((s,t)=> t.type==='income' ? s+t.amount : s-t.amount, 0);
    openingBal = setCurBal - netSinceWinStart;
  }
  // Now assign running balance to each window txn
  let runBal = openingBal;
  window._currentTxns = showAllTxns ? allTxns : allWindowTxns;
  const txnsWithBal = window._currentTxns.map(t => {
    if(t.type==='income') runBal += t.amount;
    else if(t.type==='debit' && t.amount > 0) runBal -= t.amount;
    return {...t, _runBal: Math.round(runBal)};
  });
  const todayStr2=localDateStr(new Date());

    const isCustom=t._custom||customIds.has(t.id);
    const src=t.source||'other';
    const srcCls=isIncome?(src==='Mitch'?'mitch':'molly'):'other';
    const inAmt=isIncome&&t.amount>0?`<span class="txn-in ${srcCls}">+${fmt(t.amount)}</span>`:`<span class="txn-in other"></span>`;
    const outAmt=!isIncome&&t.amount>0?`<span class="txn-out">${fmt(t.amount)}</span>`:`<span class="txn-out zero">—</span>`;
    const tagCls=isIncome?`income-tag ${srcCls}`:isCustom?'custom-tag':'';
    // Use t.date.slice(0,7) so cross-month txns target the correct month key
    const tMonthKey=t.date.slice(0,7);
    const editBtn=isCustom
      ?`<button class="edit-btn" data-action="edit-custom" data-k="${tMonthKey}" data-id="${t.id}" title="Edit">✎</button>`
      :`<button class="edit-btn" data-action="edit-row" data-k="${tMonthKey}" data-date="${t.date}" data-out="${isIncome?0:t.amount}" data-pay="${isIncome?t.amount:0}" title="Edit">✎</button>`;
    const balCls = t._runBal === undefined ? '' : t._runBal < 0 ? 'neg' : 'pos';
    const balCell = setCurBal !== null
      ? `<span class="txn-bal ${balCls}">${t._runBal<0?'-':''}$${Math.abs(t._runBal).toLocaleString()}</span>`
      : `<span class="txn-bal" style="color:var(--c-muted);font-size:10px">set balance</span>`;
    return divider+`<div class="txn-row ${dateCls}${isIncome?' income-row':isCustom?' is-custom':''}">
      <span class="txn-date">${dayLbl(t.date)}</span>
      <div class="txn-label"><span class="txn-tag ${tagCls}">${t.item}</span></div>
      ${inAmt}${outAmt}${balCell}${editBtn}
    </div>`;
  }).join('');

  // Chart moved to Overview tab
  renderNegBalWidget();
  // Event delegation for edit buttons
  document.getElementById('txn-rows').addEventListener('click', handleEditClick);
}

function handleEditClick(e){
  const btn = e.target.closest('[data-action]');

  if(action === 'edit-custom'){
    openEditModal(k, btn.dataset.id);
  } else if(action === 'edit-row'){
    // Find txn by date+month key — avoids any index scope issues
    const date = btn.dataset.date;
    const out = parseFloat(btn.dataset.out)||0;
    const pay = parseFloat(btn.dataset.pay)||0;
    // Look up item from BASE or CUSTOM for this date+month
    const md = getMonthData(k);
    const txn = (md.transactions||[]).find(t => t.date===date && (t.amount===out||t.amount===pay));
    const item = txn ? txn.item : btn.dataset.date; // fallback to date string

function localDateStr(d){
  // Returns YYYY-MM-DD in LOCAL time (not UTC) to avoid timezone off-by-one
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function renderCashflow(){
  // All transactions from 5 days ago through end of data
  const today = new Date(); today.setHours(0,0,0,0);
  const startD = new Date(today); startD.setDate(startD.getDate()-5);
  const startStr = localDateStr(startD);
  const todayStr = localDateStr(today);
  // Use last month in BASE data as end point (not browser year which may differ)
  const allBaseKeys = Object.keys(BASE).sort();
  const lastKey = allBaseKeys[allBaseKeys.length-1]; // e.g. '2026-12'
  const endStr = lastKey + '-31'; // last day of last data month
  const dataYear = lastKey.slice(0,4);
  const yearStr = dataYear;
  // Read filter state
  const activeFilter = cfFilter || '';
  const activeType = cfTypeFilter || 'all';

  // Gather all txns across all months in range
  const allTxns=[];
  Object.keys(BASE).sort().forEach(mk=>{
    if(mk.slice(0,4)!==yearStr&&mk<startStr.slice(0,7)) return;
    if(mk>endStr.slice(0,7)) return;
    const md=getMonthData(mk);
    (md.transactions||[]).forEach(t=>{
      if(t.amount!==0&&t.date>=startStr&&t.date<=endStr) allTxns.push({...t});
    });
  });
  allTxns.sort((a,b)=>a.date<b.date?-1:1);

  // Compute running balance from cur balance (anchored to today)
  const setCurBal=loadBal();
  let openingBal=setCurBal||0;
  if(setCurBal!==null){
    // Walk back from today to startStr to find opening balance
    const preTxns=[];
    Object.keys(BASE).sort().forEach(mk=>{
      if(mk<startStr.slice(0,7)||mk>todayStr.slice(0,7))return;
      getMonthData(mk).transactions?.forEach(t=>{
        if(t.amount!==0&&t.date>=startStr&&t.date<=todayStr)preTxns.push(t);
      });
    });
    const net=preTxns.reduce((s,t)=>t.type==='income'?s+t.amount:s-t.amount,0);
    openingBal=setCurBal-net;
  }

  // Assign running balances
  let run=openingBal;
  const customIds=new Set(Object.values(CUSTOM).flat().map(c=>c.id));
  const txnsWithBal=allTxns.map(t=>{
    if(t.type==='income') run+=t.amount;
    else if(t.amount>0) run-=t.amount;
    return{...t,_runBal:Math.round(run)};
  });

  // Group by month for headers (filtered)
  // Apply filters FIRST before grouping by month (uses cfFilter + cfTypeFilter)
  const displayTxns = txnsWithBal.filter(t => {
    if(cfTypeFilter === 'income' && t.type !== 'income') return false;
    if(cfTypeFilter === 'expense' && t.type === 'income') return false;
    if(cfFilter && !t.item.toLowerCase().includes(cfFilter)) return false;
    return true;
  });

  const byMonth={};
  displayTxns.forEach(t=>{
    const mk=t.date.slice(0,7);
    if(!byMonth[mk]) byMonth[mk]=[];
    byMonth[mk].push(t);
  });

  // Build HTML
  const totalFiltered=txnsWithBal.length;
  const totalIn=txnsWithBal.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const totalOut=txnsWithBal.filter(t=>t.type==='debit'&&t.amount>0).reduce((s,t)=>s+t.amount,0);

  let html=`<div style="max-width:900px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <div>
        <div style="font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--c-muted);margin-bottom:2px">Cashflow</div>
        <div style="font-size:12px;color:var(--c-muted)">${new Date(startStr+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short'})} – 31 Dec ${dataYear} · ${displayTxns.length} of ${txnsWithBal.length} entries</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input type="text" placeholder="Search…" oninput="setCfSearch(this.value)" value="${cfFilter}" style="padding:5px 10px;border:1px solid var(--c-border);border-radius:7px;background:var(--c-bg);color:var(--c-text);font-size:13px;font-family:inherit;width:160px">
        <div style="display:flex;gap:3px">
          <button class="cf-filter-btn ${cfTypeFilter==='all'?'active':''}" data-type="all" onclick="setCfFilter('all')" style="padding:5px 12px;border-radius:7px;border:1px solid var(--c-border);background:${cfTypeFilter==='all'?'var(--c-text)':'none'};color:${cfTypeFilter==='all'?'var(--c-bg)':'var(--c-muted)'};font-size:12px;cursor:pointer;font-family:inherit">All</button>
          <button class="cf-filter-btn ${cfTypeFilter==='income'?'active':''}" data-type="income" onclick="setCfFilter('income')" style="padding:5px 12px;border-radius:7px;border:1px solid var(--c-border);background:${cfTypeFilter==='income'?'var(--c-text)':'none'};color:${cfTypeFilter==='income'?'var(--c-bg)':'var(--c-muted)'};font-size:12px;cursor:pointer;font-family:inherit">Income</button>
          <button class="cf-filter-btn ${cfTypeFilter==='expense'?'active':''}" data-type="expense" onclick="setCfFilter('expense')" style="padding:5px 12px;border-radius:7px;border:1px solid var(--c-border);background:${cfTypeFilter==='expense'?'var(--c-text)':'none'};color:${cfTypeFilter==='expense'?'var(--c-bg)':'var(--c-muted)'};font-size:12px;cursor:pointer;font-family:inherit">Expenses</button>
        </div>
      </div>
    </div>
    <div class="txn-list">
      <div class="txn-header" style="grid-template-columns:75px 1fr 80px 80px 90px 28px">
        <span>Date</span><span>Item</span>
        <span style="text-align:right">In</span>
        <span style="text-align:right">Out</span>
        <span style="text-align:right">Balance</span>
        <span></span>
      </div>`;

  let todayDivDone=false;
  Object.keys(byMonth).sort().forEach(mk=>{
    const monthName=MONTHS[+mk.split('-')[1]-1]+' '+mk.split('-')[0];
    html+=`<div style="padding:8px 14px 4px;font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--c-muted);background:var(--c-bg);border-bottom:1px solid var(--c-border)">${monthName}</div>`;

    byMonth[mk].forEach(t=>{
      if(!todayDivDone&&t.date>=todayStr){
        todayDivDone=true;
        if(t.date===todayStr) html+=`<div class="txn-divider">Today — ${new Date(todayStr+'T00:00:00').toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'})}</div>`;
      }
      const isIncome=t.type==='income';
      const isCustom=t._custom||customIds.has(t.id);
      const src=t.source||'other';
      const srcCls=isIncome?(src==='Mitch'?'mitch':'molly'):'other';
      const tagCls=isIncome?`income-tag ${srcCls}`:isCustom?'custom-tag':'';
      const dateCls=t.date<todayStr?'is-past':t.date===todayStr?'is-today':'is-future';
      const inAmt=isIncome&&t.amount>0?`<span class="txn-in ${srcCls}">+${fmt(t.amount)}</span>`:`<span class="txn-in other"></span>`;
      const outAmt=!isIncome&&t.amount>0?`<span class="txn-out">${fmt(t.amount)}</span>`:`<span class="txn-out zero">—</span>`;
      const balCls=t._runBal<0?'neg':'pos';
      const balCell=setCurBal!==null
        ?`<span class="txn-bal ${balCls}">${t._runBal<0?'-':''}$${Math.abs(t._runBal).toLocaleString()}</span>`
        :`<span class="txn-bal" style="color:var(--c-muted);font-size:10px">—</span>`;
      const cfMonthKey=t.date.slice(0,7);
      const editBtn=isCustom
        ?`<button class="edit-btn" data-action="edit-custom" data-k="${cfMonthKey}" data-id="${t.id}" title="Edit">✎</button>`
        :`<button class="edit-btn" data-action="edit-row" data-k="${cfMonthKey}" data-date="${t.date}" data-out="${isIncome?0:t.amount}" data-pay="${isIncome?t.amount:0}" title="Edit">✎</button>`;
      html+=`<div class="txn-row ${dateCls}${isIncome?' income-row':isCustom?' is-custom':''}" style="grid-template-columns:75px 1fr 80px 80px 90px 28px">
        <span class="txn-date">${dayLbl(t.date)}</span>
        <div class="txn-label"><span class="txn-tag ${tagCls}">${t.item}</span></div>
        ${inAmt}${outAmt}${balCell}${editBtn}
      </div>`;
    });
  });

  html+=`</div></div>`;
  document.getElementById('content').innerHTML=html;
  // Delegate edit clicks - reuse same handler
  const cfRows = document.getElementById('cf-txn-rows');
  if(cfRows) cfRows.addEventListener('click', handleEditClick);
  else {
    // fallback: delegate on content
    document.getElementById('content').addEventListener('click', handleEditClick);
  }
}


function renderRecurring(){
  const el = document.getElementById('content');

  // Build recurring summary from BASE data
  const itemMonths = {}, itemAmounts = {}, itemType = {}, itemLastDate = {};
  Object.keys(BASE).sort().forEach(mk => {
    // Sum ALL occurrences per month for correct monthly total
    const monthTotals = {};
    (BASE[mk].transactions||[]).forEach(t => {
      if(t.amount <= 0) return;
      if(!itemMonths[t.item]) itemMonths[t.item] = new Set();
      itemMonths[t.item].add(mk);
      monthTotals[t.item] = (monthTotals[t.item]||0) + t.amount;
      itemType[t.item] = t.type || 'debit';
      if(!itemLastDate[t.item] || t.date > itemLastDate[t.item]) itemLastDate[t.item] = t.date;
    });
    // Push monthly total into amounts array
    Object.entries(monthTotals).forEach(([item, total]) => {
      if(!itemAmounts[item]) itemAmounts[item] = [];
      itemAmounts[item].push(total);
    });
  });

  // Also include user custom entries
  Object.keys(CUSTOM).sort().forEach(mk => {
    const customMonthTotals = {};
    (CUSTOM[mk]||[]).filter(c=>!c._suppress&&c.amount>0).forEach(t => {
      if(!itemMonths[t.item]) itemMonths[t.item] = new Set();
      itemMonths[t.item].add(mk);
      customMonthTotals[t.item] = (customMonthTotals[t.item]||0) + t.amount;
      itemType[t.item] = t.type || 'debit';
      if(!itemLastDate[t.item] || t.date > itemLastDate[t.item]) itemLastDate[t.item] = t.date;
    });
    Object.entries(customMonthTotals).forEach(([item, total]) => {
      if(!itemAmounts[item]) itemAmounts[item] = [];
      itemAmounts[item].push(total);
    });
  });

  // Filter: 3+ unique months
  const recurring = Object.keys(itemMonths)
    .filter(k => itemMonths[k].size >= 3)
    .map(k => {
      const amts = itemAmounts[k] || [];
      const avg = Math.round(amts.reduce((a,b)=>a+b,0) / amts.length);
      const n = itemMonths[k].size;
      const freq = n >= 10 ? 'Monthly' : n >= 6 ? 'Monthly' : n >= 4 ? 'Quarterly' : 'Occasional';
      return { item: k, type: itemType[k], avg, count: n, freq, last: itemLastDate[k] };
    })
    .sort((a,b) => b.count - a.count);

  // Separate income and expense
  const income = recurring.filter(r => r.type === 'income');
  const expenses = recurring.filter(r => r.type !== 'income');

  // Totals
  const totalMonthlyOut = expenses.filter(r=>r.freq==='Monthly').reduce((s,r)=>s+r.avg,0);
  const totalMonthlyIn  = income.filter(r=>r.freq==='Monthly').reduce((s,r)=>s+r.avg,0);

  function buildRows(items){
    return items.map(r => {
      const isIncome = r.type === 'income';
      const freqBadge = '<span style="font-size:10px;padding:2px 7px;border-radius:8px;background:var(--c-border);color:var(--c-muted)">' + r.freq + '</span>';
      const amtCls = isIncome ? 'color:var(--c-green)' : 'color:var(--c-red)';
      const sign = isIncome ? '+' : '-';
      return '<div style="display:grid;grid-template-columns:1fr 80px 100px 60px;align-items:center;gap:12px;padding:9px 16px;border-bottom:1px solid var(--c-border)">'
        + '<div style="font-size:13px;color:var(--c-text)">' + r.item + '</div>'
        + '<div>' + freqBadge + '</div>'
        + '<div style="font-family:monospace;font-size:13px;font-weight:500;text-align:right;' + amtCls + '">' + sign + fmt(r.avg) + '/mo</div>'
        + '<div style="font-size:11px;color:var(--c-muted);text-align:right">' + r.count + 'x</div>'
        + '</div>';
    }).join('');
  }

  el.innerHTML = '<div style="max-width:700px">'
    // Summary cards
    + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px">'
    + '<div class="stat-card"><div class="stat-label">Recurring income</div><div class="stat-value pos">+' + fmt(totalMonthlyIn) + '</div><div class="stat-sub">per month</div></div>'
    + '<div class="stat-card"><div class="stat-label">Recurring expenses</div><div class="stat-value neg">-' + fmt(totalMonthlyOut) + '</div><div class="stat-sub">per month</div></div>'
    + '<div class="stat-card"><div class="stat-label">Net recurring</div><div class="stat-value ' + (totalMonthlyIn-totalMonthlyOut>=0?'pos':'neg') + '">' + fmtS(totalMonthlyIn-totalMonthlyOut) + '</div><div class="stat-sub">per month</div></div>'
    + '</div>'

    // Income section
    + (income.length ? '<div class="txn-list" style="margin-bottom:16px">'
      + '<div style="padding:9px 16px;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--c-green);border-bottom:1px solid var(--c-border);background:var(--c-bg)">Income (' + income.length + ')</div>'
      + '<div style="display:grid;grid-template-columns:1fr 80px 100px 60px;gap:12px;padding:7px 16px;border-bottom:1px solid var(--c-border);font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--c-muted)">'
      + '<span>Item</span><span>Frequency</span><span style="text-align:right">Avg/month</span><span style="text-align:right">Count</span></div>'
      + buildRows(income) + '</div>' : '')

    // Expenses section
    + '<div class="txn-list">'
    + '<div style="padding:9px 16px;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--c-red);border-bottom:1px solid var(--c-border);background:var(--c-bg)">Expenses (' + expenses.length + ')</div>'
    + '<div style="display:grid;grid-template-columns:1fr 80px 100px 60px;gap:12px;padding:7px 16px;border-bottom:1px solid var(--c-border);font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--c-muted)">'
    + '<span>Item</span><span>Frequency</span><span style="text-align:right">Avg/month</span><span style="text-align:right">Count</span></div>'
    + buildRows(expenses) + '</div>'
    + '</div>';
}

function saveAdd(baseKey){
  const type=document.getElementById('f-type').value;
  const date=document.getElementById('f-date').value;
  const label=document.getElementById('f-label').value.trim();
  const amt=parseFloat(document.getElementById('f-amount').value)||0;
  const repeat=document.getElementById('f-repeat').value;
  const untilEl=document.getElementById('f-until');
  const untilDate=untilEl?untilEl.value:null;
  if(!date||!label){toast('Fill in date and label');return;}
  if(!amt){toast('Enter an amount');return;}
  const entries=[];
  if(repeat==='none'){
    entries.push({date,item:label,amount:amt,type,id:uid(),_custom:true});
  } else {
    const until=untilDate?new Date(untilDate+'T00:00:00'):new Date(date+'T00:00:00');
    if(untilDate) until.setHours(23,59,59);
    let d=new Date(date+'T00:00:00');
    const maxIter=untilDate?3650:366; // safety cap
    let count=0;
    while(d<=until&&count<maxIter){
      entries.push({date:localDateStr(d),item:label,amount:amt,type,id:uid(),_custom:true});
      if(repeat==='daily') d.setDate(d.getDate()+1);
      else if(repeat==='weekly') d.setDate(d.getDate()+7);
      else if(repeat==='fortnightly') d.setDate(d.getDate()+14);
      else if(repeat==='monthly') d.setMonth(d.getMonth()+1);
      count++;
    }
  }
  entries.forEach(e=>{const k=e.date.slice(0,7);if(!CUSTOM[k])CUSTOM[k]=[];CUSTOM[k].push(e);});
  pushUndo();saveCustom();closeModal();
  toast('Added "'+label+'"'+(repeat!=='none'?' ('+entries.length+' entries)':''));
  renderSidebar();renderContent();
}

function openEditModal(k,id){
  let entry=null;let foundKey=k;

    for(const mk of Object.keys(CUSTOM)){
      const found=(CUSTOM[mk]||[]).find(c=>c.id===id);
      if(found){entry=found;foundKey=mk;break;}
    }
  }
  if(!entry)return;
  const allSameLabel=Object.values(CUSTOM).flat().filter(c=>c.item===entry.item);
  const isRecurring=allSameLabel.length>1;
  const futureCount=allSameLabel.filter(c=>c.date>entry.date).length;

  // Store keys globally so onclick can reference them without string quoting issues
  window._editK=foundKey; window._editId=id;

  let deleteButtons='';
  if(isRecurring){
    deleteButtons='<div style="display:flex;gap:6px;flex-wrap:wrap">'
      +'<button class="btn-delete" style="font-size:11px;padding:6px 10px" onclick="deleteEntry(window._editK,window._editId)">This only</button>';
    if(futureCount>0){
      deleteButtons+='<button class="btn-delete" style="font-size:11px;padding:6px 10px" onclick="deleteFutureEntries(window._editK,window._editId)">This + future ('+futureCount+')</button>';
    }
    deleteButtons+='<button class="btn-delete" style="font-size:11px;padding:6px 10px" onclick="deleteAllEntries(window._editId)">All ('+allSameLabel.length+')</button>'
      +'</div>';
  } else {
    deleteButtons='<button class="btn-delete" onclick="deleteEntry(window._editK,window._editId)">Delete</button>';
  }
  window._editFutureK=foundKey; window._editFutureId=id;

  const titleBadge=isRecurring?' <span style="font-size:10px;padding:1px 6px;border-radius:8px;background:#2563eb18;color:var(--c-accent)">recurring</span>':'';
  showModal(
    '<div class="modal-title"><span>Edit entry'+titleBadge+'</span><button class="modal-close" onclick="closeModal()">×</button></div>'
    +'<div class="form-row"><label class="form-label">Date</label><input class="form-input" id="e-date" type="date" value="'+entry.date+'"></div>'
    +'<div class="form-row"><label class="form-label">Label</label><input class="form-input" id="e-label" type="text" value="'+(entry.item||'')+'"></div>'
    +'<div class="form-row"><label class="form-label">Amount ($)</label><input class="form-input" id="e-amount" type="number" min="0" step="1" value="'+(entry.amount||0)+'"></div>'
    +'<div class="modal-actions">'+deleteButtons+'<button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveEdit(window._editK,window._editId)">Save</button></div>'
  );
}

function saveEdit(k,id){
  const arr=CUSTOM[k]||[];const idx=arr.findIndex(c=>c.id===id);if(idx<0)return;
  const date=document.getElementById('e-date').value;
  const label=document.getElementById('e-label').value.trim();
  const amt=parseFloat(document.getElementById('e-amount').value)||0;
  if(!date||!label){toast('Fill in all fields');return;}
  pushUndo();
  const oldLabel=arr[idx].item;
  arr[idx]={...arr[idx],date,item:label,amount:amt};
  // If label changed, rename all other entries with the same old label
  if(label!==oldLabel){
    let renamed=0;
    Object.keys(CUSTOM).forEach(mk=>{
      (CUSTOM[mk]||[]).forEach(c=>{
        if(c.id!==id&&c.item===oldLabel){c.item=label;renamed++;}
      });
    });
    saveCustom();closeModal();
    toastUndo('Updated'+(renamed>0?' + renamed '+renamed+' other'+(renamed>1?'s':''):''));
  } else {
    saveCustom();closeModal();toastUndo('Entry updated');
  }
  renderSidebar();renderContent();
}

function deleteEntry(k,id){
  pushUndo();
  CUSTOM[k]=(CUSTOM[k]||[]).filter(c=>c.id!==id);
  saveCustom();closeModal();toastUndo('Entry deleted');renderSidebar();renderContent();
}

function suppressRow(modeNum){
  const modes=['one','future','all'];
  suppressEntry(window._rowK,window._rowDate,window._rowItem,modes[modeNum]);
}
function suppressEntry(k,date,item,mode){
  pushUndo();
  // mode: 'one' | 'future' | 'all'
  if(mode==='one'){
    if(!CUSTOM[k])CUSTOM[k]=[];
    // Avoid duplicate suppressions
    const already=CUSTOM[k].some(c=>c._suppress&&c.item===item&&c.date===date);
    if(!already) CUSTOM[k].push({date,item,amount:0,type:'suppress',id:uid(),_custom:true,_suppress:true});
  } else if(mode==='future'){
    // Suppress this date and all future occurrences of same item
    Object.keys(BASE).sort().forEach(mk=>{
      (BASE[mk].transactions||[]).forEach(t=>{
        if(t.item===item&&t.date>=date){
          if(!CUSTOM[mk])CUSTOM[mk]=[];
          const already=CUSTOM[mk].some(c=>c._suppress&&c.item===item&&c.date===t.date);
          if(!already) CUSTOM[mk].push({date:t.date,item,amount:0,type:'suppress',id:uid(),_custom:true,_suppress:true});
        }
      });
    });
  } else if(mode==='all'){
    // Suppress all occurrences of this item
    Object.keys(BASE).sort().forEach(mk=>{
      (BASE[mk].transactions||[]).forEach(t=>{
        if(t.item===item){
          if(!CUSTOM[mk])CUSTOM[mk]=[];
          const already=CUSTOM[mk].some(c=>c._suppress&&c.item===item&&c.date===t.date);
          if(!already) CUSTOM[mk].push({date:t.date,item,amount:0,type:'suppress',id:uid(),_custom:true,_suppress:true});
        }
      });
    });
  }
  saveCustom();closeModal();
  toastUndo(mode==='one'?'Entry removed':mode==='future'?'This + future removed':'All removed');
  renderSidebar();renderContent();
}

function deleteFutureEntries(k,id){
  // Delete this entry + all future entries with the same item label
  const entry=Object.values(CUSTOM).flat().find(c=>c.id===id);
  if(!entry)return;
  pushUndo();
  const label=entry.item;
  const fromDate=entry.date;
  Object.keys(CUSTOM).forEach(mk=>{
    CUSTOM[mk]=CUSTOM[mk].filter(c=>!(c.item===label&&c.date>=fromDate));
  });
  saveCustom();closeModal();toastUndo('This + future deleted');renderSidebar();renderContent();
}

function deleteAllEntries(id){
  // Delete all entries with the same item label
  const entry=Object.values(CUSTOM).flat().find(c=>c.id===id);
  if(!entry)return;
  pushUndo();
  const label=entry.item;
  Object.keys(CUSTOM).forEach(mk=>{
    CUSTOM[mk]=CUSTOM[mk].filter(c=>c.item!==label);
  });
  saveCustom();closeModal();toastUndo('All "'+label+'" deleted');renderSidebar();renderContent();
}

function openEditRowModal(k,date,out,pay,item){
  const isIncome=pay>0;
  let occurrences=[];
  Object.keys(BASE).sort().forEach(mk=>{
    (BASE[mk].transactions||[]).forEach(t=>{
      if(t.item===item) occurrences.push({date:t.date,mk});
    });
  });
  const isRecurring=occurrences.length>1;
  const futureOccs=occurrences.filter(o=>o.date>date).length;

  // Store in globals to avoid quoting issues in onclick
  window._rowK=k; window._rowDate=date; window._rowOut=out; window._rowPay=pay; window._rowItem=item;

  let deleteSection='<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--c-border)">'
    +'<div style="font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--c-muted);margin-bottom:8px">Remove entry</div>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
    +'<button class="btn-delete" style="font-size:11px;padding:6px 10px" onclick="suppressRow(0)">This only</button>';
  if(isRecurring&&futureOccs>0){
    deleteSection+='<button class="btn-delete" style="font-size:11px;padding:6px 10px" onclick="suppressRow(1)">This + future ('+futureOccs+')</button>';
  }
  if(isRecurring){
    deleteSection+='<button class="btn-delete" style="font-size:11px;padding:6px 10px" onclick="suppressRow(2)">All ('+occurrences.length+')</button>';
  }
  deleteSection+='</div></div>';

  const recurBadge=isRecurring?' <span style="font-size:10px;padding:1px 6px;border-radius:8px;background:var(--c-border);color:var(--c-muted)">recurring</span>':'';
  showModal(
    '<div class="modal-title"><span>Edit — '+item+recurBadge+'</span><button class="modal-close" onclick="closeModal()">×</button></div>'
    +deleteSection
    +'<p style="font-size:11px;color:var(--c-muted);margin-bottom:10px">Or adjust the amount:</p>'
    +'<div style="background:var(--c-bg);border-radius:7px;padding:9px 11px;margin-bottom:12px;font-size:12px;color:var(--c-muted)">'+(isIncome?'In: '+fmt(pay):'Out: '+fmt(out))+'</div>'
    +'<div class="form-row"><label class="form-label">New amount ($)</label><input class="form-input" id="r-amount" type="number" min="0" step="1" value="'+(isIncome?pay:out)+'"></div>'
    +'<div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveRowEdit(window._rowK,window._rowDate,window._rowOut,window._rowPay,window._rowItem)">Save</button></div>'
  );
}

function saveRowEdit(k,date,origOut,origPay,item){
  const isIncome=origPay>0;
  const newAmt=parseFloat(document.getElementById('r-amount').value)||0;
  const newName=(document.getElementById('r-name')?.value||'').trim();
  const origAmt=isIncome?origPay:origOut;
  const diff=newAmt-origAmt;
  if(!CUSTOM[k])CUSTOM[k]=[];
  // Save rename if provided
  if(newName&&newName!==item){
    // Remove any existing rename for this entry
    CUSTOM[k]=CUSTOM[k].filter(c=>!(c._rename&&c.date===date&&c.item===item));
    CUSTOM[k].push({date,item,amount:0,type:'rename',id:uid(),_custom:true,_rename:newName});
  }
  // Save amount adjustment if changed
  if(diff!==0){
    CUSTOM[k].push({date,item:item+' (adj)',amount:Math.abs(diff),type:isIncome?'income':'debit',id:uid(),_custom:true});
  }
  if((newName&&newName!==item)||diff!==0){
    saveCustom();closeModal();toast('Saved');renderSidebar();renderContent();
  } else {
    closeModal();
  }
}

// ── CURRENT BALANCE ───────────────────────────────────────────────────────────
function loadBal(){try{const s=localStorage.getItem('mm_current_balance');return s!==null?parseFloat(s):null;}catch(e){return null;}}
function saveBal(v){
  try{localStorage.setItem('mm_current_balance',String(v));}catch(e){}
  // Always use the hashed path if available (set after unlock)
  const path=window.FB_BAL_DATA_PATH;
  if(!path){console.warn('Balance not saved to Firebase: app not yet unlocked');return;}
  fetch(FB_URL+path,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(v)}).catch(()=>{});
}
function renderBal(){
  const v=loadBal();const el=document.getElementById('cur-bal-display');if(!el)return;
  if(v===null){el.textContent='Set';el.className='current-bal-value';return;}
  el.textContent=(v<0?'-':'')+('$'+Math.abs(Math.round(v)).toLocaleString());
  el.className='current-bal-value '+(v>=0?'pos':'neg');
}
function editBalance(){
  const cur=loadBal();
  const w=document.getElementById('current-bal-widget');
  // Remove the widget-level onclick while editing to prevent interference
  w.onclick=null;
  w.innerHTML=`<span class="current-bal-label">Balance</span><div class="bal-edit-wrap"><input class="bal-input" id="bal-input" type="number" step="1" placeholder="e.g. 3500" value="${cur!==null?cur:''}" onkeydown="if(event.key==='Enter'){event.stopPropagation();saveBalance();}if(event.key==='Escape'){event.stopPropagation();cancelBalance();}"><button class="bal-save-btn" onclick="event.stopPropagation();saveBalance()">Save</button></div>`;
  setTimeout(()=>{const i=document.getElementById('bal-input');if(i){i.focus();i.select();}},30);
}
function saveBalance(){
  const inp=document.getElementById('bal-input');if(!inp)return;
  const v=parseFloat(inp.value);
  if(!isNaN(v)){
    saveBal(v);
    toast('Balance updated');
    cancelBalance();
  } else {
    toast('Enter a valid number');
  }
}
function cancelBalance(){
  const w=document.getElementById('current-bal-widget');
  w.innerHTML=`<span class="current-bal-label">Balance</span><span class="current-bal-value" id="cur-bal-display">—</span>`;
  w.onclick=editBalance;
  renderBal();
  renderContent();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
// ── INIT ──────────────────────────────────────────────────────────────────────
(function(){
  const now=new Date();
  const y=now.getFullYear();
  const m=String(now.getMonth()+1).padStart(2,'0');
  const todayKey=y+'-'+m;
  const allKeys=Object.keys(BASE).sort();
  const yearMatch=allKeys.filter(k=>k.startsWith(y+'-'));
  if(yearMatch.length){
    curYear=y;
    curMonth=allKeys.includes(todayKey)?todayKey:yearMatch[yearMatch.length-1];
  } else {
    curYear=+allKeys[allKeys.length-1].split('-')[0];
    curMonth=allKeys[allKeys.length-1];
  }
})();
// ── PASSWORD PROTECTION ──────────────────────────────────────────────────────
async function hashPassword(pwd){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pwd));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

let pwdHash='';

async function checkPassword(){
  const pwd=document.getElementById('lock-pwd').value;
  if(!pwd){document.getElementById('lock-error').textContent='Enter a password';return;}
  const hash=await hashPassword(pwd);
  const stored=localStorage.getItem('mm_pwd_hash');
  if(!stored){
    // First time — set the password
    localStorage.setItem('mm_pwd_hash',hash);
    pwdHash=hash;
    unlockApp();
    return;
  }
  if(hash===stored){
    pwdHash=hash;
    unlockApp();
  } else {
    document.getElementById('lock-error').textContent='Incorrect password';
    document.getElementById('lock-pwd').value='';
    document.getElementById('lock-pwd').focus();
  }
}

function unlockApp(){
  document.getElementById('lock-screen').style.display='none';
  document.getElementById('app').style.display='grid';
  // Update Firebase paths to include password hash
  window.FB_DATA_PATH='/budget/'+pwdHash+'/custom.json';
  window.FB_BAL_DATA_PATH='/budget/'+pwdHash+'/balance.json';
  sessionStorage.setItem('mm_unlocked','1');
  // Boot the app
  renderSidebar();renderContent();renderBal();
  const mp=document.getElementById('month-picker');
  if(mp) mp.style.display='flex';
  updateMonthPickerLabel();
  syncFromFirebase();
}

// Check if already unlocked this session
(async()=>{
  const stored=localStorage.getItem('mm_pwd_hash');
  const session=sessionStorage.getItem('mm_unlocked');
  if(stored&&session==='1'){
    pwdHash=stored;
    unlockApp();
  } else {
    // Show hint if password already set
    if(stored){
      document.getElementById('lock-hint').textContent='Password already set — enter it to unlock';
    } else {
      document.getElementById('lock-hint').textContent='First time? Enter any password to set it';
    }
    document.getElementById('lock-pwd').focus();
  }
})();
</script>
